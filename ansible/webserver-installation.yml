# ---
- name: Install Nginx and Deploy Mini Finance Website
  hosts: web
  become: yes
  tasks:
    # --- PHASE 1: INSTALLATION ---
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Start and Enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    # --- PHASE 2: DEPLOYMENT ---
    - name: Clone the Mini Finance project from GitHub
      git:
        repo: "https://github.com/pravinmishraaws/mini_finance.git"
        dest: "/tmp/mini_finance"
        force: yes # Good for NOC ops to ensure fresh code

    - name: Copy website content to web server root
      copy:
        src: "/tmp/mini_finance/"
        dest: "/var/www/html/"
        owner: www-data
        group: www-data
        mode: "0755"
        remote_src: yes

    # --- PHASE 3: CONFIGURATION ---
    - name: Overwrite default Nginx site configuration
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80;
              server_name _;
              root /var/www/html;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              error_page 404 /index.html;
          }
        owner: root
        group: root
        mode: "0644"

    - name: Restart Nginx to apply changes
      service:
        name: nginx
        state: restarted